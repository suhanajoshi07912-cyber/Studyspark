<!DOCTYPE html>
<html>
<head>
    <title>StudySpark - Homework Reminder</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f8ff;
            margin:0;
            padding:20px;
        }

        .container{
            max-width:700px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:15px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            color:#2c3e50;
        }

        input,select{
            padding:10px;
            margin:5px;
            border:1px solid #ccc;
            border-radius:8px;
        }

        button{
            padding:10px 15px;
            background:#4CAF50;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }

        button:hover{
            background:#45a049;
        }

        .task{
            background:#eef5ff;
            padding:15px;
            margin-top:10px;
            border-radius:10px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .completed{
            text-decoration:line-through;
            opacity:0.6;
        }

        .stats{
            display:flex;
            justify-content:space-around;
            margin:20px 0;
            font-weight:bold;
        }

        .progress{
            width:100%;
            background:#ddd;
            border-radius:20px;
        }

        .progress-bar{
            height:20px;
            width:0%;
            background:#4CAF50;
            border-radius:20px;
        }

        .quote{
            text-align:center;
            margin-top:15px;
            color:#555;
            font-style:italic;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>📚 StudySpark</h1>

    <center>
        <input type="text" id="taskInput" placeholder="Enter Homework">

        <select id="subject">
            <option>Math</option>
            <option>Science</option>
            <option>English</option>
            <option>Social Studies</option>
        </select>

        <input type="date" id="dueDate">

        <button onclick="addTask()">Add</button>
    </center>

    <div class="stats">
        <div>🔥 Streak: <span id="streak">0</span></div>
        <div>🏆 XP: <span id="xp">0</span></div>
        <div>✅ Completed: <span id="completed">0</span></div>
    </div>

    <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <h3>Homework List</h3>
    <div id="taskList"></div>

    <div class="quote" id="quote">
        Success is the sum of small efforts repeated daily.
    </div>

</div>

<script>

let totalTasks = 0;
let completedTasks = 0;
let xp = 0;
let streak = 0;

const quotes = [
"Small progress is still progress.",
"Finish today's work today.",
"Consistency beats talent.",
"One homework at a time.",
"Every completed task builds success."
];

function addTask(){

    const taskInput = document.getElementById("taskInput");
    const subject = document.getElementById("subject").value;
    const dueDate = document.getElementById("dueDate").value;

    if(taskInput.value===""){
        alert("Enter homework first!");
        return;
    }

    totalTasks++;

    const taskDiv = document.createElement("div");
    taskDiv.className = "task";

    taskDiv.innerHTML = `
        <span>
        <b>${subject}</b><br>
        ${taskInput.value}<br>
        📅 ${dueDate}
        </span>

        <button onclick="completeTask(this)">
            Complete
        </button>
    `;

    document.getElementById("taskList").appendChild(taskDiv);

    taskInput.value="";

    updateProgress();
}

function completeTask(button){

    const task = button.parentElement;

    if(task.classList.contains("completed"))
        return;

    task.classList.add("completed");

    completedTasks++;
    xp += 10;
    streak++;

    document.getElementById("completed").textContent = completedTasks;
    document.getElementById("xp").textContent = xp;
    document.getElementById("streak").textContent = streak;

    document.getElementById("quote").textContent =
        quotes[Math.floor(Math.random()*quotes.length)];

    updateProgress();
}

function updateProgress(){

    if(totalTasks===0){
        return;
    }

    let progress =
    (completedTasks/totalTasks)*100;

    document.getElementById("progressBar").style.width =
    progress + "%";
}

</script>

</body>
</html>
